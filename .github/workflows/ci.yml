name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Set up JDK 21 (for the cliparser oracle)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build cliparser oracle JAR
        working-directory: vendor/pumpx2-oracle
        run: ./gradlew :cliparser:shadowJar

      - name: swift build
        run: swift build

      - name: swift test (byte-exact oracle parity)
        env:
          # OracleRunner finds the JAR at the default vendor path; point it at CI's JDK.
          PUMPX2_JAVA: ${{ env.JAVA_HOME }}/bin/java
        run: swift test
